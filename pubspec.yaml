name: finora
description: "Finora — Premium Offline Personal Finance Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Date formatting
  intl: ^0.19.0

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # File handling
  path_provider: ^2.1.3
  open_filex: ^4.5.0

  # Settings
  shared_preferences: ^2.3.1

  # Utilities
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  share_plus: ^12.0.2
  local_auth: ^2.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/
